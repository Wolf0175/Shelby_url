name: Frontend CD Pipeline (Merge to Main)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [ closed ]

jobs:
  build_and_push_docker:
    runs-on: ubuntu-latest
    # Safety check: Only run if the code was pushed directly, or if the PR was successfully merged
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          # Changed context to point to your specific frontend folder
          context: ./url-shortener-ui/front-end
          file: ./url-shortener-ui/front-end/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vue-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/vue-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max